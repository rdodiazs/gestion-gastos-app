<!DOCTYPE html>
<html lang="es">
    <head>
      <meta charset="UTF-8"/>
      <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
      <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
      <link href="../css/main.css" rel="stylesheet"/>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
      <title>Gestion de Gastos</title>
    </head>
    <body>
        <div class="main-wrapper">
            <header class="main-header">
                <nav class="main-nav">
                    <p class="nav-main-text"><a href="main.html">Gestión de Gastos</a></p>
                    <ul>
                        <li><a href="main.html">Inicio</a></li>
                        <li><a href="#">Reporte</a></li>
                        <li><a href="#">Configuración</a></li>
                    </ul>
                    <p class="cerrar-sesion"><a href="login.html"><i class='fa-solid fa-arrow-right-from-bracket'></i>Salir</a></p>
                </nav>
                
                <div class="opacity-bar"></div>
                <div class="side-menu">
                    <div class="side-menu-wrapper">
                        <div class="close-menu-icon">
                            <i class="fa-solid fa-xmark"></i>
                        </div>

                        <div class="sidemenu-content">
                            <h1>Gestión de Gastos</h1>

                            <ul class="menu-links">
                                <li><a href="main.html"><i class='fa-solid fa-house'></i>Inicio</a></li>
                                <li><a href="#"><i class='fa-solid fa-gear'></i>Configuración</a></li>
                                <li><a href="#"><i class='fa-solid fa-chart-line'></i>Reporte</a></li>
                                <li><a href="login.html"><i class='fa-solid fa-arrow-right-from-bracket'></i>Salir</a></li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="header-content">
                    <div class="hamburger-menu-icon">
                        <i class="fa-solid fa-bars"></i>
                    </div>

                    <div class="header-content-wrapper">
                        <div class="saludo">
                            <p>Hola,</p>
                            <p class="nombre-usuario">John Doe</p>
                        </div>
                        <p class="gasto-text">Tu gasto del último mes es de</p>
                        <p class="gasto">$8.000</p>
                    </div>
                </div>
            </header>    

            <section class="body-content">
                <h2>Revisa tus gastos</h2>

                <div class="gastos-mes-container">
                    <ul>
                        <li><a href="resumen_mes.html">Enero 2025</a></li>
                        <li><a href="#">Febrero 2025</a></li>
                        <li><a href="#">Marzo 2025</a></li>
                        <li><a href="#">Marzo 2025</a></li>
                    </ul>

                    <div class="btn-ingresar">
                        <button>Ingresar Boleta</button>
                    </div>
                </div>

                <div class="opacity-ingresar"></div>
                <div class="ingresar-container">
                    <div class="close-ingresar">
                        <i class="fa-solid fa-xmark"></i>
                    </div>

                    <h2>Ingresa tu boleta</h2>

                    <form>
                    <!--
                        =============================================
                            Explicacion de expresiones regulares:
                        =============================================

                        1) /^(?!\s*$).*$/
                           --------------
                        Busca evitar que el usuario ingrese solo espacios en
                        blanco (incluyendo saltos de linea y tabulaciones).

                        2) /^(0|[1-9]\d*)$/
                           ----------------
                        Usado en los inputs numericos. Busca que el usuario
                        solo ingrese numeros enteros positivos. Si, por ejemplo,
                        la cadena consiste solo de ceros (por ej, 000), lo toma
                        como invalido. Lo mismo sucede si empieza con un cero y
                        tiene otros numeros (por ej, 0124).
                    -->

                        <input type="text" name="titulo" id="titulo" maxlength="30" placeholder="Título" pattern="^(?!\s*$).*$" required/>
                        <input type="text" name="nro-boleta" id="nro-boleta" placeholder="N° de Boleta" pattern="^(0|[1-9]\d*)$" required/>
                        <input type="date" name="fecha" id="fecha" required/>
                        <input type="text" name="costo" id="costo" placeholder="Costo final" pattern="^(0|[1-9]\d*)$" required/>
                        <input type="text" name="descripcion" id="descripcion" maxlength="50" placeholder="Descripción" pattern="^(?!\s*$).*$"/>

                        <button class="confirmar-btn">Confirmar</button>
                    </form>
                </div>
            </section>
        </div>
        <script src="../js/main.js"></script>
    </body>
</html>
