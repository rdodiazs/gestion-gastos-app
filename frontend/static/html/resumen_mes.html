<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8"/>
        <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <link href="../css/resumen_mes.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <title>Gestión de Gastos - Resumen mensual</title>
    </head>
    <body>
        <header class="main-header">
            <div class="title-container">
                <a href="main.html">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>

                <h1>Gasto de Enero 2025</h1>
            </div>

            <div class="resumen-container">
                <div class="resumen-content">
                    <h2>Resumen de gastos</h2>
                    <p>Gasto total</p>
                     <!--Aca va el gasto total. Se agrega con JavaScript -->
                    <p></p>
                    <p><b>Última actualización</b>: 14-02-2025 15:14</p>
                </div>
            </div>
        </header>

        <main class="resumen-body">
            <section class="boletas-container">
                <h2>Boletas del mes</h2>

                <div class="listado-boletas">
                    <article class="boleta">
                        <p class="fecha">05-01-2025</p>
                        <h3 class="titulo">
                            <span><a href="detalle_boleta.html">Boleta 1</a></span>
                            <i class="fa-solid fa-trash-can"></i>
                        </h3>
                        <p class="costo">$3.000</p>
                    </article>

                    <article class="boleta">
                        <p class="fecha">12-01-2025</p>
                        <h3 class="titulo">
                            <span>Ipsum pariatur est iusto. Veni</span>
                            <i class="fa-solid fa-trash-can"></i>
                        </h3>
                        <p class="costo">$10.500</p>
                    </article>

                    <article class="boleta">
                        <p class="fecha">23-01-2025</p>
                        <h3 class="titulo">
                            <span>Boleta 3</span>
                            <i class="fa-solid fa-trash-can"></i>

                        </h3>
                        <p class="costo">$4.000</p>
                    </article>
                </div>
            </section>
        </main>

        <dialog>
            <div class="header-modal">
                <div class="close-modal">
                    <i class="fa-solid fa-xmark"></i>
                </div>
                <p><span>¿Deseas eliminar esta boleta?</span> No podrás revertir esta acción.</p>
            </div>
            <div class="caja-decision">
                <button value="cancelar">No</button>
                <button value="confirmar">Si</button>
            </div>
        </dialog>

        <script src="../js/resumen_mes.js"></script>
    </body>
</html>
