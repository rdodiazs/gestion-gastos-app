<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8"/>
        <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <link href="../css/login.css" rel="stylesheet"/>
        <title>Gestión de Gastos - Iniciar Sesión</title>
    </head>
    <body>
        <div class="wrapper-page">
            <header class="header-login">
                <div class="header-content">
                    <h1>Gestión de Gastos</h1>
                    <h2>Tu App para seguir y administrar tus gastos.</h2>
                </div>
            </header>

            <main class="main-container">
                <div class="content-wrapper">
                    <article class="login-body">
                        <h2>Bienvenido/a</h2>
        
                        <form class="formulario login-formulario" action="main.html">
                            <input id="usuario" type="text" name="usuario" placeholder="Usuario"/>
                            <input id="correo" type="email" name="correo" placeholder="Email"/>
                            <button>Iniciar sesión</button>
                        </form>
        
                        <p>¿No tienes cuenta? <span class="clickable signup-click">Hazte una aquí</span></p>
                    </article> 

                    <article class="crear-cuenta-body">
                        <h2>¡Únete a la app!</h2>

                        <form class="formulario crear-cuenta-formulario">
                            <input id="nombre" type="text" name="nombre" placeholder="Nombre"/>
                            <input id="nombre-usuario" type="text" name="nombre-usuario" placeholder="Usuario"/>
                            <input id="correo" type="email" name="correo" placeholder="Email"/>

                            <button>Crear cuenta</button>
                        </form>

                        <p>¿Ya tienes una cuenta? <span class="clickable login-click">Inicia sesión</span>
                    </article>
                </div>
            </main>
        </div>
        <script src="../js/login.js"></script>
    </body>
</html>
