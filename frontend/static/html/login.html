<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8"/>
        <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <link href="../css/login.css" rel="stylesheet"/>
        <title>Gestión de Gastos - Iniciar Sesión</title>
    </head>
    <body>
        <header class="header-login">
            <h1>Gestión de Gastos</h1>
            <h2>Tu App para seguir y administrar tus gastos.</h2>
        </header>

        <main class="main-container">
            <div class="content-wrapper">
                <article class="login-body">
                    <h2>Bienvenido/a</h2>
    
                    <form class="formulario login-formulario" action="main.html">
                        <input class="usuario" type="text" name="user" placeholder="Usuario" autocomplete="off"/>
                        <input class="email" type="email" name="email" placeholder="Email" autocomplete="off"/>
                        <button>Iniciar sesión</button>
                    </form>
    
                    <p>¿No tienes cuenta? <span class="clickable signup-click">Hazte una aquí</span></p>
                </article> 

                <article class="crear-cuenta-body">
                    <h2>¡Únete a la app!</h2>

                    <form class="formulario crear-cuenta-formulario">
                        <input id="name" name="name" type="text" placeholder="Nombre"/>
                        <input id="username" name="username" type="text" placeholder="Usuario"/>
                        <input id="email" type="email" placeholder="Email"/>

                        <button>Crear cuenta</button>
                    </form>

                    <p>¿Ya tienes una cuenta? <span class="clickable login-click">Inicia sesión</span>
                </article>
            </div>
        </main>

        <script src="../js/login.js"></script>
    </body>
</html>
